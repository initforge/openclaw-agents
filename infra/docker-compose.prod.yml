services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis

  telegram-control-bot:
    build:
      context: ..
      dockerfile: infra/Dockerfile.telegram-control-bot
    env_file:
      - ../.env
    depends_on:
      - api

  telegram-listener:
    build:
      context: ..
      dockerfile: infra/Dockerfile.telegram-listener
    env_file:
      - ../.env
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openclaw_ops
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
